<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Chacabuco Clima - Estación en Vivo</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌤️</text></svg>">

    <style>
        /* --- DISEÑO MINIMALISTA --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #ffffff; 
            color: #000000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container { 
            max-width: 500px; 
            width: 100%; 
        }

        /* --- CABECERA --- */
        .header { 
            margin-bottom: 50px; 
            border-bottom: 1px solid #000;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .header h1 { 
            font-size: 1.8rem; 
            font-weight: 800; 
            letter-spacing: -1.5px;
            text-transform: uppercase;
        }
        #status { 
            font-size: 0.8rem; 
            color: #666;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- LISTADO DE DATOS --- */
        .weather-list {
            display: flex;
            flex-direction: column;
        }

        .data-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .data-item:last-child { border-bottom: none; }

        /* Títulos de datos */
        .label { 
            font-size: 1.1rem; 
            font-weight: 600; 
            color: #444;
        }

        /* Bloque de valores */
        .value-wrapper {
            text-align: right;
            display: flex;
            align-items: baseline;
        }

        .value { 
            font-size: 2.5rem; 
            font-weight: 800; 
            letter-spacing: -1px;
            line-height: 1;
        }

        .unit { 
            font-size: 1.1rem; 
            font-weight: 600; 
            color: #888; 
            margin-left: 5px;
        }

        /* --- DETALLES DE VIENTO --- */
        .wind-group {
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        .wind-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .viento-sub { 
            font-size: 0.9rem; 
            color: #666; 
            font-weight: 600;
            margin-top: 5px;
            display: flex;
            gap: 10px;
        }

        /* --- FOOTER --- */
        .footer { 
            font-size: 0.85rem; 
            color: #999; 
            margin-top: 60px; 
            font-weight: 500;
        }
        #time { color: #000; font-weight: 700; }

        /* Adaptación móvil */
        @media (max-width: 400px) {
            .value { font-size: 2.2rem; }
            .label { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Chacabuco</h1>
        <p id="status">Sincronizando...</p>
    </div>

    <div class="weather-list">
        
        <div class="data-item">
            <div class="label">Temperatura</div>
            <div class="value-wrapper">
                <span class="value" id="temp">--</span>
                <span class="unit">°C</span>
            </div>
        </div>

        <div class="data-item">
            <div class="label">Humedad</div>
            <div class="value-wrapper">
                <span class="value" id="hum">--</span>
                <span class="unit">%</span>
            </div>
        </div>

        <div class="data-item">
            <div class="wind-group">
                <div class="wind-top">
                    <div class="label">Viento</div>
                    <div class="value-wrapper">
                        <span class="value" id="wind">--</span>
                        <span class="unit">km/h</span>
                    </div>
                </div>
                <div class="viento-sub">
                    <span id="wind-dir">Dir: --</span>
                    <span>/</span>
                    <span id="gust">Ráfagas: -- km/h</span>
                </div>
            </div>
        </div>

        <div class="data-item">
            <div class="label">Presión</div>
            <div class="value-wrapper">
                <span class="value" id="press">--</span>
                <span class="unit">hPa</span>
            </div>
        </div>

        <div class="data-item">
            <div class="label">Índice UV</div>
            <div class="value-wrapper">
                <span class="value" id="uv">--</span>
                <span class="unit" id="solar">-- W/m²</span>
            </div>
        </div>

        <div class="data-item">
            <div class="label">Lluvia Hoy</div>
            <div class="value-wrapper">
                <span class="value" id="rain">--</span>
                <span class="unit">mm</span>
            </div>
        </div>

        <div class="data-item">
            <div class="label">Luna</div>
            <div class="value-wrapper">
                <span class="value" id="moon-icon">--</span>
                <span class="unit" id="moon-phase">Cargando</span>
            </div>
        </div>

    </div>

    <div class="footer">
        Actualizado a las <span id="time">--:--</span> hs
    </div>
</div>

<script src="js/clima.js"></script>

</body>
</html>
