<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estación Chacabuco</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --sub: #888888;
            --border: #f0f0f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            display: flex; 
            justify-content: center;
            padding: 40px 20px;
        }

        .container { max-width: 400px; width: 100%; }

        header { 
            border-bottom: 3px solid var(--text); 
            padding-bottom: 8px; 
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        h1 { font-size: 1.6rem; font-weight: 900; text-transform: uppercase; letter-spacing: -1.5px; }
        #status { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--sub); }

        .item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 0; 
            border-bottom: 1px solid var(--border);
        }

        .label { font-size: 0.9rem; font-weight: 700; text-transform: uppercase; color: var(--sub); letter-spacing: 0.5px; }

        .value-box { text-align: right; }

        .value { font-size: 2.6rem; font-weight: 900; letter-spacing: -2px; line-height: 0.9; }
        
        .unit { font-size: 0.9rem; font-weight: 800; color: var(--sub); margin-left: 2px; }

        /* Estilo para la ráfaga debajo del viento */
        .gust-sub { 
            display: block;
            font-size: 1rem; 
            font-weight: 700; 
            color: var(--sub); 
            margin-top: 5px;
        }

        footer { margin-top: 40px; font-size: 0.85rem; font-weight: 700; color: var(--sub); border-top: 1px solid var(--border); padding-top: 15px; }
        #last-update { color: var(--text); }

        .highlight { background-color: #f9f9f9; margin: 0 -15px; padding: 20px 15px; border-radius: 12px; border-bottom: none !important; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Chacabuco</h1>
        <span id="status">En Vivo</span>
    </header>

    <div class="grid">
        <div class="item">
            <span class="label">Temperatura</span>
            <div class="value-box">
                <span class="value" id="temp">--</span><span class="unit">°C</span>
            </div>
        </div>

        <div class="item">
            <span class="label">Humedad</span>
            <div class="value-box">
                <span class="value" id="hum">--</span><span class="unit">%</span>
            </div>
        </div>

        <div class="item">
            <span class="label">Presión</span>
            <div class="value-box">
                <span class="value" id="press">--</span><span class="unit">hPa</span>
            </div>
        </div>

        <div class="item">
            <span class="label">Dirección Viento</span>
            <div class="value-box">
                <span class="value" id="wind-dir">--</span>
            </div>
        </div>

        <div class="item">
            <span class="label">Velocidad Viento</span>
            <div class="value-box">
                <div><span class="value" id="wind">--</span><span class="unit">km/h</span></div>
                <span class="gust-sub">(Ráfaga: <span id="gust">--</span> km/h)</span>
            </div>
        </div>

        <div class="item">
            <span class="label">Índice UV</span>
            <div class="value-box">
                <span class="value" id="uv">--</span>
            </div>
        </div>

        <div class="item">
            <span class="label">Lluvia 24h</span>
            <div class="value-box">
                <span class="value" id="rain-24">--</span><span class="unit">mm</span>
            </div>
        </div>

        <div class="item highlight">
            <span class="label">Último Evento</span>
            <div class="value-box">
                <span class="value" id="rain-event">--</span><span class="unit">mm</span>
            </div>
        </div>
    </div>

    <footer>
        Actualizado <span id="last-update">--:--</span>
    </footer>
</div>

<script>
    async function update() {
        try {
            const res = await fetch('./data/latest.json?t=' + Date.now());
            const json = await res.json();
            const d = json.data;

            document.getElementById('temp').innerText = parseFloat(d.outdoor.temperature.value).toFixed(1);
            document.getElementById('hum').innerText = d.outdoor.humidity.value;
            document.getElementById('press').innerText = Math.round(d.pressure.relative.value);
            document.getElementById('uv').innerText = d.solar_and_uvi.uvi.value;
            document.getElementById('rain-24').innerText = parseFloat(d.rainfall.daily.value).toFixed(1);
            document.getElementById('rain-event').innerText = parseFloat(d.rainfall.event.value).toFixed(1);

            // Viento y Ráfaga
            document.getElementById('wind').innerText = parseFloat(d.wind.wind_speed.value).toFixed(1);
            document.getElementById('gust').innerText = parseFloat(d.wind.wind_gust.value).toFixed(1);
            
            // Dirección (Solo letras)
            const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSO','SO','OSO','O','ONO','NO','NNO'];
            const angle = d.wind.wind_direction.value;
            document.getElementById('wind-dir').innerText = dirs[Math.round(angle / 22.5) % 16];

            const date = new Date(json.time * 1000);
            document.getElementById('last-update').innerText = date.toLocaleTimeString('es-AR', {
                hour: '2-digit', minute:'2-digit', timeZone: 'America/Argentina/Buenos_Aires'
            }) + ' hs';
            
            document.getElementById('status').innerText = 'En Vivo';
        } catch (e) {
            document.getElementById('status').innerText = 'Reconectando...';
        }
    }
    update();
    setInterval(update, 300000);
</script>

</body>
</html>
