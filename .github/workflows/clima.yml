name: Actualizar Clima Chacabuco

on:
  schedule:
    - cron: '*/10 * * * *' 
  workflow_dispatch: 

jobs:
  update-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Procesar Datos y Actualizar Historial
        run: |
          mkdir -p data
          
          # 1. DESCARGAR Y FILTRAR (Unidades: C, hPa, mm, km/h)
          # Forzamos precip_unitid=13 para milímetros (mm)
          curl -s -X GET "https://api.ecowitt.net/api/v3/device/real_time?application_key=${{ secrets.ECOWITT_APPLICATION_KEY }}&api_key=${{ secrets.ECOWITT_API_KEY }}&mac=${{ secrets.ECOWITT_STATION_MAC }}&temp_unitid=1&pressure_unitid=3&precip_unitid=13&wind_speed_unitid=7&call_back=all" \
          | jq 'del(.data.indoor, .data.battery)' > data/latest.json
          
          # 2. EXTRAER VALORES
          TIME_UNIX=$(jq -r '.time' data/latest.json)
          FECHA=$(TZ="America/Argentina/Buenos_Aires" date -d "@$TIME_UNIX" +"%Y-%m-%d %H:%M")
          
          TEMP=$(jq -r '.data.outdoor.temperature.value' data/latest.json)
          HUM=$(jq -r '.data.outdoor.humidity.value' data/latest.json)
          PRES=$(jq -r '.data.pressure.relative.value' data/latest.json)
          VIENTO=$(jq -r '.data.wind.wind_speed.value' data/latest.json)
          RAFAGA=$(jq -r '.data.wind.wind_gust.value' data/latest.json)
          DIR=$(jq -r '.data.wind.wind_direction.value' data/latest.json)
          LLUVIA=$(jq -r '.data.rainfall.daily.value' data/latest.json)
          SOLAR=$(jq -r '.data.solar_and_uvi.solar.value' data/latest.json)
          UVI=$(jq -r '.data.solar_and_uvi.uvi.value' data/latest.json)

          # 3. ACTUALIZAR CSV CON UNIDADES EN EL ENCABEZADO
          # Nota: Si el archivo ya existe, no sobreescribe el encabezado viejo.
          # Sugerencia: Borrá el historial.csv viejo desde GitHub una vez para que se cree con estos títulos.
          if [ ! -f data/historial.csv ]; then
            echo "Fecha,Temp(C),Hum(%),Presion(hPa),Viento(kmh),Rafaga(kmh),Dir(deg),Lluvia(mm),Solar(Wm2),UV(index)" > data/historial.csv
          fi
          echo "$FECHA,$TEMP,$HUM,$PRES,$VIENTO,$RAFAGA,$DIR,$LLUVIA,$SOLAR,$UVI" >> data/historial.csv

      - name: Commit y Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data/latest.json data/historial.csv
          git commit -m "Clima Chacabuco: Unidades en encabezado" || echo "Sin cambios"
          git push
