name: Actualizar Clima Chacabuco

on:
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
          
      - name: Procesar Datos y Actualizar Historial
        run: |
          mkdir -p data
          
          # 1. DESCARGAR ORIGINAL con reintentos
          for i in {1..3}; do
            curl -s -X GET "https://api.ecowitt.net/api/v3/device/real_time?application_key=${{ secrets.ECOWITT_APPLICATION_KEY }}&api_key=${{ secrets.ECOWITT_API_KEY }}&mac=${{ secrets.ECOWITT_STATION_MAC }}&temp_unitid=1&pressure_unitid=3&precip_unitid=13&wind_speed_unitid=7&call_back=all" > data/raw.json && break
            echo "Reintento $i..."
            sleep 5
          done
          
          # Validar JSON antes de seguir
          if ! jq empty data/raw.json; then
            echo "Error: JSON inválido"
            exit 1
          fi
          
          # 2. LIMPIAR PRIVACIDAD Y CONVERTIR BLOQUE DE LLUVIA
          jq '.data.outdoor |= del(.vpd) | 
              del(.data.indoor, .data.battery) |
              .data.rainfall.rain_rate.value |= (tonumber * 25.4 * 10 | round / 10) |
              .data.rainfall.rain_rate.unit = "mm/hr" |
              .data.rainfall."1_hour".value |= (tonumber * 25.4 * 10 | round / 10) |
              .data.rainfall."1_hour".unit = "mm" |
              .data.rainfall.daily.value |= (tonumber * 25.4 * 10 | round / 10) |
              .data.rainfall.daily.unit = "mm" |
              .data.rainfall.event.value |= (tonumber * 25.4 * 10 | round / 10) |
              .data.rainfall.event.unit = "mm" |
              .data.rainfall.weekly.value |= (tonumber * 25.4 * 10 | round / 10) |
              .data.rainfall.weekly.unit = "mm" |
              .data.rainfall.monthly.value |= (tonumber * 25.4 * 10 | round / 10) |
              .data.rainfall.monthly.unit = "mm" |
              .data.rainfall.yearly.value |= (tonumber * 25.4 * 10 | round / 10) |
              .data.rainfall.yearly.unit = "mm"' data/raw.json > data/latest.json
          
          # 3. EXTRAER TODO (igual que antes)
          TIME_UNIX=$(jq -r '.time' data/latest.json)
          FECHA=$(TZ="America/Argentina/Buenos_Aires" date -d "@$TIME_UNIX" +"%Y-%m-%d %H:%M")
          TEMP=$(jq -r '.data.outdoor.temperature.value' data/latest.json)
          HUM=$(jq -r '.data.outdoor.humidity.value' data/latest.json)
          # ... resto de variables igual que tu script original ...
          
          # 4. ACTUALIZAR CSV
          if [ ! -f data/historial.csv ]; then
            echo "Fecha,Temp(C),Hum(%)" > data/historial.csv
          fi
          echo "$FECHA,$TEMP,$HUM" >> data/historial.csv
          
          rm data/raw.json

      - name: Commit y Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data/latest.json data/historial.csv
          git commit -m "Clima Chacabuco: actualización" || echo "Sin cambios"
          git push
        continue-on-error: true   # <- evita que falle si no hay cambios
