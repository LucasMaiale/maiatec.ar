name: Fetch Ecowitt Data

on:
  schedule:
    - cron: '0 * * * *' # Se ejecuta cada hora (puedes ajustarlo)
  workflow_dispatch: # Permite ejecutarlo manualmente para probar

jobs:
  get-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Fetch API Data
        run: |
            mkdir -p data
            # Guardamos uno con fecha para el historial y uno fijo para la web
            curl -X GET "https://api.ecowitt.net/api/v3/device/real_time?application_key=${{ secrets.ECOWITT_APPLICATION_KEY }}&api_key=${{ secrets.ECOWITT_API_KEY }}&mac=${{ secrets.ECOWITT_STATION_MAC }}&call_back=all" \
            -o data/latest.json

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git commit -m "Update weather data: $(date)"
          git push
