name: CLIMA_CHACABUCO_TEST

on:
  schedule:
    - cron: '*/5 * * * *' # Probalo cada 5 min solo para ver si arranca
  workflow_dispatch:
  
jobs:
  update-weather:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v5

      - name: Procesar Datos y Actualizar Historial
        run: |
          mkdir -p data
          
          # 1. Descargar el JSON actual (se sobreescribe siempre)
          curl -s -X GET "https://api.ecowitt.net/api/v3/device/real_time?application_key=${{ secrets.ECOWITT_APPLICATION_KEY }}&api_key=${{ secrets.ECOWITT_API_KEY }}&mac=${{ secrets.ECOWITT_STATION_MAC }}&temp_unitid=1&pressure_unitid=3&precip_unitid=12&call_back=all" -o data/latest.json
          
          # 2. Extraer valores usando 'jq'
          TIME_UNIX=$(jq -r '.time' data/latest.json)
          FECHA=$(date -d "@$TIME_UNIX" +"%Y-%m-%d %H:%M")
          TEMP=$(jq -r '.data.outdoor.temperature.value' data/latest.json)
          HUM=$(jq -r '.data.outdoor.humidity.value' data/latest.json)
          PRES=$(jq -r '.data.pressure.relative.value' data/latest.json)
          VIENTO=$(jq -r '.data.wind.wind_speed.value' data/latest.json)
          LLUVIA=$(jq -r '.data.rainfall.daily.value' data/latest.json)

          # 3. Crear el CSV si no existe con sus encabezados
          if [ ! -f data/historial.csv ]; then
            echo "Fecha,Temperatura,Humedad,Presion,Viento,Lluvia" > data/historial.csv
          fi

          # 4. Agregar la nueva línea al final del archivo
          echo "$FECHA,$TEMP,$HUM,$PRES,$VIENTO,$LLUVIA" >> data/historial.csv

      - name: Guardar cambios en GitHub
        run: |
          git config --global user.name "Weather Bot"
          git config --global user.email "actions@github.com"
          git add data/latest.json data/historial.csv
          git commit -m "Update Chacabuco: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push
